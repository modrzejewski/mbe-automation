[workspace]
name = "mbe-automation"
version = "0.3.0"
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"

# --- Distilled from nomore-ase (Base & Mace Env) ---
numpy = ">=2.0,<2.4"
spglib = ">=2.6.0,<3"
gcc = ">=15.2.0,<15.3"
gxx = ">=15.2.0,<15.3"
cctbx-base = "*"
ty = ">=0.0.12,<0.0.13"
ruff = "*"
mypy = "*"
pytest = "*"

# --- Distilled from mbe-automation (Mapped to Conda) ---
pytorch = ">=2.9.0"
scipy = "*"
pandas = "*"
ase = ">=3.26.0"
networkx = "*"
matplotlib = "*"
pymatgen = ">=2026.3.23"
scikit-learn = "*"
phonopy = ">=2.43.1"
symfc = ">=1.6.1"
h5py = "*"
tqdm = "*"
joblib = "*"
dscribe = "*"
seekpath = "*"
euphonic = "*"
nglview = "*"
chemiscope = "*"
doped = "*"
pymatviz = "*"
dynasor = "*"
gemmi = "*"

[pypi-dependencies]
mbe-automation = { path = ".", editable = true }
nomore-ase = { path = "src/nomore_ase", editable = true }
pyscf = ">=2.12.0"
pyscf-dispersion = "*"
mace-torch = { path = "src/mace" }
graph-longrange = { path = "src/graph_electrostatics" }

# --- Feature: GPU CUDA 12 ---
[feature.cuda12.pypi-dependencies]
ray = "*"
cuequivariance = "*"
cuequivariance-torch = "*"
cuequivariance-ops-torch-cu12 = "*"
gpu4pyscf-cuda12x = ">=1.5.2"
cutensor-cu12 = "*"

[environments]
default = []
cuda12 = ["cuda12"]
